<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>Claude Session</title>
  <link rel="stylesheet" href="../libs/css/uspi.css">
  <style>
    .hint { padding: 4px 12px 10px; font-size: 11px; line-height: 1.55; opacity: 0.75; }
    .hint code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', Menlo, monospace; }
    .hint b { color: #4c9aff; } .hint .g { color: #3ecf6b; } .hint .a { color: #e3b341; }
  </style>
</head>
<body>
  <div class="udpi-wrapper hidden uspi-wrapper">
    <form id="property-inspector">
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Session filter</div>
        <input class="uspi-item-value" name="filter" placeholder="commander  /  coder  /  deck" value="">
      </div>
    </form>
    <div class="hint">
      Matches a session by its label (<code>DECK_SESSION</code>) or repo folder.
      <b>blue</b>=working &nbsp;<span class="g">green</span>=ready (pending next) &nbsp;<span class="a">amber</span>=needs you.
      <br>Reliable alternative: leave blank and map this key in
      <code>deck_state/cc_keys.json</code> — the tile shows <code>map &lt;keyId&gt;</code> until you do.
    </div>
  </div>

  <script src="../libs/js/constants.js"></script>
  <script src="../libs/js/eventEmitter.js"></script>
  <script src="../libs/js/timers.js"></script>
  <script src="../libs/js/utils.js"></script>
  <script src="../libs/js/ulanziApi.js"></script>
  <script>
    const FORM = '#property-inspector';
    const input = () => document.querySelector('[name="filter"]');
    $UD.connect();
    $UD.onConnected(() => document.querySelector('.udpi-wrapper').classList.remove('hidden'));
    function load(p){ if (p && typeof p.filter === 'string' && input()) input().value = p.filter; }
    $UD.onAdd((m) => load(m && m.param));
    $UD.onParamFromApp((m) => load(m && m.param));
    $UD.onDidReceiveSettings((m) => load(m && m.settings));
    function save(){ const el = input(); if (!el) return; const p = { filter: el.value.trim() }; $UD.setSettings(p); $UD.sendParamFromPlugin(p); }
    const form = document.getElementById('property-inspector');
    form.addEventListener('change', save);
    form.addEventListener('blur', save, true);
    form.addEventListener('input', Utils.debounce(save, 350));
    form.addEventListener('keyup', (e) => { if (e.key === 'Enter') save(); });
  </script>
</body>
</html>
